# .streamlit/config.toml

[theme]
# Red (196, 38, 46) for primary accents like buttons and highlights
primaryColor = "#C4262E"

# White (255, 255, 255) for the main application background
backgroundColor = "#FFFFFF"

# Gray (162, 164, 163) for secondary backgrounds like chat bubbles, sidebars, and expanders
secondaryBackgroundColor = "#A2A4A3"

# Black (0, 0, 0) for all text
textColor = "#000000"

# Optional: Set the font
font = "source sans pro"